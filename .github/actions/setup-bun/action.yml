name: Setup Bun Workspace
description: Set up the pinned Node/Bun toolchain and install repo dependencies.

runs:
    using: composite
    steps:
        - name: Set up Node
          uses: actions/setup-node@v4
          with:
              node-version: 20

        - name: Set up Bun
          uses: oven-sh/setup-bun@v2
          with:
              bun-version: 1.3.12

        - name: Install dependencies
          shell: bash
          run: bun install --frozen-lockfile
