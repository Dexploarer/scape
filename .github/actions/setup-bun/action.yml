name: Setup Bun Workspace
description: Set up the pinned Node and Bun toolchain, then install dependencies.

inputs:
    node-version:
        description: Node.js version used by build tooling.
        required: false
        default: "22.16.0"
    bun-version:
        description: Bun version used across CI workflows.
        required: false
        default: "1.3.11"

runs:
    using: composite
    steps:
        - uses: actions/setup-node@v6
          with:
              node-version: ${{ inputs.node-version }}

        - uses: oven-sh/setup-bun@v2
          with:
              bun-version: ${{ inputs.bun-version }}

        - shell: bash
          run: bun install --frozen-lockfile
