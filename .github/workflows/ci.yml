name: CI

on:
    pull_request:
    push:
        branches: [develop]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-bun
            - run: bun test

    server-build:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-bun
            - run: bun run server:build

    client-build:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-bun
            - run: bun run build

    docs-build:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-bun
            - run: bun run docs:build
