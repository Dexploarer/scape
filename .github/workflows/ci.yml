name: CI

on:
    pull_request:
    push:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    regression:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup-bun

            - name: Test suite
              run: bun test tests/*.test.ts

            - name: Server build
              run: bun run server:build

            - name: SpacetimeDB build
              run: bun run spacetimedb:build

            - name: Client build
              run: bun run build

            - name: Docs build
              run: bun run docs:build
